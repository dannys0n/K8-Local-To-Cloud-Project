apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
- ../../base
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: game-backend:local
    - op: replace
      path: /spec/template/spec/containers/0/env/8/value
      value: game-server:local
  target:
    kind: Deployment
    name: game-backend
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: game-proxy:local
  target:
    kind: Deployment
    name: game-proxy
